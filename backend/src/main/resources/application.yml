server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: eaa-recruit-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recruitment}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: RecruitHikariPool
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:30000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:20000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
      keepalive-time: ${DB_POOL_KEEPALIVE:60000}
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        query:
          in_clause_parameter_padding: true
        generate_statistics: false
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_COMMAND_TIMEOUT:2000ms}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:1000ms}
      lettuce:
        pool:
          enabled: true
          min-idle: ${REDIS_POOL_MIN_IDLE:2}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-wait: ${REDIS_POOL_MAX_WAIT:500ms}
        shutdown-timeout: 200ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: recruit-backend
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.eaa.recruit.*"

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    enable:
      hikaricp: true

jwt:
  secret: ${JWT_SECRET:change-me-in-production-min-256-bits-long-secret-key}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

otp:
  ttl-seconds: ${OTP_TTL_SECONDS:300}
  length: ${OTP_LENGTH:6}
  key-prefix: "otp:"
